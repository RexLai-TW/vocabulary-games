<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國小必學2000英文單字 — 遊戲學習</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #ff6b9d; --blue: #4ecdc4; --yellow: #ffe66d; --purple: #a78bfa;
    --orange: #ff8a5c; --green: #34d399; --red: #f87171; --sky: #38bdf8;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #667eea22, #764ba222), #f0f4ff;
    min-height: 100vh;
    padding: 16px;
  }

  .app { max-width: 900px; margin: 0 auto; }

  /* Header */
  .header {
    text-align: center;
    padding: 24px 0 16px;
  }

  .header h1 {
    font-size: 2rem;
    background: linear-gradient(90deg, var(--pink), var(--purple), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p { color: #888; font-size: .85rem; margin-top: 4px; }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .stat { text-align: center; }
  .stat-val { font-size: 1.4rem; font-weight: 800; color: var(--purple); }
  .stat-label { font-size: .65rem; color: #999; text-transform: uppercase; letter-spacing: 1px; }

  /* Level Select */
  .level-bar {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap;
  }

  .level-btn {
    padding: 8px 18px; border-radius: 24px; border: 2px solid #ddd;
    background: #fff; cursor: pointer; font-size: .8rem; font-weight: 700;
    transition: all .2s; color: #666;
  }

  .level-btn:hover { transform: scale(1.05); }
  .level-btn.active { border-color: var(--purple); background: var(--purple); color: #fff; }

  /* Category Grid */
  .section-title {
    font-size: 1rem; font-weight: 800; margin-bottom: 12px; color: #333;
    display: flex; align-items: center; gap: 6px;
  }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }

  .cat-card {
    background: #fff;
    border-radius: 14px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
    border: 2px solid transparent;
  }

  .cat-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,.1); }
  .cat-card.selected { border-color: var(--purple); background: #f5f0ff; }

  .cat-icon { font-size: 2rem; margin-bottom: 4px; }
  .cat-name { font-size: .78rem; font-weight: 700; color: #333; }
  .cat-count { font-size: .6rem; color: #999; margin-top: 2px; }

  /* Game Mode Select */
  .game-modes {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .mode-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
    border: 3px solid transparent;
  }

  .mode-card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 8px 20px rgba(0,0,0,.12); }
  .mode-card.active { border-color: var(--blue); background: #f0fffe; }

  .mode-icon { font-size: 2.4rem; margin-bottom: 6px; }
  .mode-name { font-size: .85rem; font-weight: 800; color: #333; }
  .mode-desc { font-size: .65rem; color: #999; margin-top: 2px; }

  /* Game Area */
  .game-area {
    background: #fff;
    border-radius: 20px;
    padding: 32px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    text-align: center;
    min-height: 350px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .game-area h2 { font-size: 1.2rem; color: #333; margin-bottom: 8px; }
  .game-subtitle { font-size: .75rem; color: #999; margin-bottom: 20px; }

  /* Progress bar */
  .progress-bar {
    width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden;
  }

  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple));
    border-radius: 4px; transition: width .3s;
  }

  /* Word Display */
  .word-display {
    font-size: 2.8rem;
    font-weight: 900;
    color: #333;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }

  .word-phonetic { font-size: .85rem; color: #aaa; margin-bottom: 24px; }

  /* Choice Buttons */
  .choices { display: grid; gap: 10px; width: 100%; max-width: 500px; }
  .choices.cols-2 { grid-template-columns: 1fr 1fr; }
  .choices.cols-4 { grid-template-columns: 1fr 1fr; }

  .choice-btn {
    padding: 16px 12px;
    border-radius: 14px;
    border: 3px solid #eee;
    background: #fafafa;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    color: #333;
  }

  .choice-btn:hover { border-color: var(--purple); background: #f5f0ff; transform: scale(1.02); }
  .choice-btn.correct { border-color: var(--green); background: #ecfdf5; color: var(--green); animation: pop .3s; }
  .choice-btn.wrong { border-color: var(--red); background: #fef2f2; color: var(--red); animation: shake .4s; }

  @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* Spelling Game */
  .spelling-hint { font-size: 1.4rem; color: #666; margin-bottom: 8px; }
  .spelling-phonetic { font-size: .9rem; color: #aaa; margin-bottom: 20px; }

  .letter-slots { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
  .letter-slot {
    width: 44px; height: 52px;
    border: 3px solid #ddd;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 800; color: var(--purple);
    background: #fafafa;
    transition: all .2s;
  }

  .letter-slot.filled { border-color: var(--purple); background: #f5f0ff; }
  .letter-slot.current { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(78,205,196,.2); }

  .letter-options { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }

  .letter-btn {
    width: 44px; height: 44px;
    border-radius: 10px;
    border: 2px solid #ddd;
    background: #fff;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    color: #333;
  }

  .letter-btn:hover { border-color: var(--blue); transform: scale(1.1); }
  .letter-btn.used { opacity: .3; pointer-events: none; }

  /* Scramble Game */
  .scrambled-letters { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }

  .scramble-btn {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    color: #fff;
    font-size: 1.2rem;
    font-weight: 800;
    border: none;
    cursor: pointer;
    transition: all .15s;
  }

  .scramble-btn:hover { transform: scale(1.1); }
  .scramble-btn.used { opacity: .3; pointer-events: none; }

  /* Speed Quiz */
  .timer-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
  .timer-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .1s linear, background .5s; }

  /* Result Screen */
  .result-screen { text-align: center; }
  .result-score { font-size: 4rem; font-weight: 900; color: var(--purple); }
  .result-label { font-size: 1rem; color: #666; margin-bottom: 8px; }
  .result-stars { font-size: 2.5rem; margin-bottom: 16px; letter-spacing: 4px; }

  .new-words { text-align: left; width: 100%; max-width: 400px; margin: 16px auto; }
  .new-word-item { padding: 8px 12px; background: #f5f0ff; border-radius: 8px; margin-bottom: 6px; font-size: .85rem; display: flex; justify-content: space-between; }

  /* Buttons */
  .btn-primary {
    padding: 14px 36px;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all .2s;
    margin-top: 16px;
  }

  .btn-primary:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(167,139,250,.4); }

  .btn-secondary {
    padding: 10px 24px;
    background: #f0f0f0;
    color: #666;
    border: none;
    border-radius: 10px;
    font-size: .85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-secondary:hover { background: #e0e0e0; }

  /* Back button */
  .back-btn {
    position: absolute; top: 16px; left: 16px;
    background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #999;
    transition: color .2s;
  }

  .back-btn:hover { color: #333; }

  /* Confetti */
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall 1.5s ease-out forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(300px) rotate(720deg); opacity: 0; }
  }

  /* Welcome screen */
  .welcome-emoji { font-size: 4rem; margin-bottom: 8px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

  /* Wrong answer hint display */
  .wrong-hint {
    background: linear-gradient(135deg, #fff3e0, #ffe0b2);
    border: 2px solid #ff9800;
    border-radius: 16px;
    padding: 16px 24px;
    margin-top: 16px;
    text-align: center;
    animation: hintSlideIn .3s ease-out;
  }

  @keyframes hintSlideIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .wrong-hint-label { font-size: .85rem; color: #e65100; font-weight: 700; margin-bottom: 4px; }
  .wrong-hint-answer { font-size: 1.3rem; font-weight: 900; color: #bf360c; }
  .wrong-hint-meaning { font-size: .95rem; color: #e65100; margin-top: 4px; }

  /* Responsive */
  @media (max-width: 600px) {
    .header h1 { font-size: 1.4rem; }
    .word-display { font-size: 2rem; }
    .cat-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .game-modes { grid-template-columns: repeat(2, 1fr); }
    .choices.cols-4 { grid-template-columns: 1fr 1fr; }
    .letter-slot { width: 36px; height: 44px; font-size: 1.1rem; }
    .letter-btn { width: 38px; height: 38px; }
  }

  /* Hidden */
  .hidden { display: none !important; }

  /* Streak indicator */
  .streak { position: absolute; top: 16px; right: 16px; font-size: .75rem; color: var(--orange); font-weight: 800; }

  /* Speaker button */
  .speaker-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: #fff; font-size: 1.4rem; border: none; cursor: pointer;
    transition: all .2s; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(78,205,196,.3);
  }

  .speaker-btn:hover { transform: scale(1.15); box-shadow: 0 4px 16px rgba(78,205,196,.5); }
  .speaker-btn:active { transform: scale(.95); }

  /* Listen mode big speaker */
  .listen-speaker {
    width: 100px; height: 100px; font-size: 3rem; border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff; border: none; cursor: pointer; transition: all .2s;
    box-shadow: 0 4px 20px rgba(255,107,157,.4); margin-bottom: 24px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100%{box-shadow:0 4px 20px rgba(255,107,157,.4)}
    50%{box-shadow:0 4px 30px rgba(255,107,157,.7)}
  }

  .listen-speaker:hover { transform: scale(1.1); }

  /* Word bank modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }

  .modal {
    background: #fff; border-radius: 20px; padding: 24px; max-width: 600px; width: 100%;
    max-height: 80vh; overflow-y: auto; position: relative;
  }

  .modal h3 { margin-bottom: 12px; color: #333; }

  .word-list-item {
    display: flex; justify-content: space-between; padding: 6px 0;
    border-bottom: 1px solid #f0f0f0; font-size: .85rem;
  }

  .word-learned { color: var(--green); }
  .word-unlearned { color: #ccc; }

  .modal-close {
    position: absolute; top: 16px; right: 16px; background: none; border: none;
    font-size: 1.4rem; cursor: pointer; color: #999;
  }

  /* TTS Status Badge */
  .tts-status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px; font-size: .7rem; font-weight: 700;
    margin-top: 8px; transition: all .3s;
  }

  .tts-status.google { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
  .tts-status.fallback { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
  .tts-status.error { background: #fce4ec; color: #c62828; border: 1px solid #ef9a9a; }

  .tts-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }

  .tts-status.google .tts-dot { background: #4caf50; animation: pulse-dot 1.5s infinite; }
  .tts-status.fallback .tts-dot { background: #ff9800; }
  .tts-status.error .tts-dot { background: #f44336; }

  @keyframes pulse-dot {
    0%,100%{opacity:1}50%{opacity:.4}
  }

  /* ==================== PROFILE SYSTEM ==================== */
  .profile-selector { text-align: center; padding: 20px 0; }
  .profile-selector h2 { color: #333; margin-bottom: 8px; font-size: 1.5rem; }
  .profile-selector p { color: #666; margin-bottom: 24px; font-size: .9rem; }

  .profiles-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 16px; max-width: 700px; margin: 0 auto 24px; padding: 0 16px;
  }

  .profile-card {
    background: #fff; border-radius: 16px; padding: 20px 12px; cursor: pointer;
    border: 3px solid transparent; transition: all .2s; box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }

  .profile-card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,.12); border-color: var(--primary); }

  .profile-avatar { font-size: 3rem; margin-bottom: 8px; display: block; }
  .profile-name { font-weight: 700; color: #333; font-size: .95rem; margin-bottom: 4px; word-break: break-word; }

  .profile-stats-mini { font-size: .7rem; color: #999; line-height: 1.6; }

  .profile-add-card {
    background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border-radius: 16px; padding: 20px 12px; cursor: pointer;
    border: 3px dashed #4caf50; transition: all .2s; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 140px;
  }

  .profile-add-card:hover { background: linear-gradient(135deg, #c8e6c9, #a5d6a7); transform: translateY(-4px); }
  .profile-add-icon { font-size: 2.5rem; margin-bottom: 8px; }
  .profile-add-text { font-weight: 700; color: #2e7d32; font-size: .95rem; }

  /* Avatar picker modal */
  .avatar-picker-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; max-height: 300px; overflow-y: auto; padding: 8px;
  }

  .avatar-option {
    font-size: 2rem; background: #f5f5f5; border: 2px solid transparent; border-radius: 12px; cursor: pointer;
    padding: 8px; text-align: center; transition: all .15s;
  }

  .avatar-option:hover { background: #e8f5e9; border-color: var(--primary); transform: scale(1.1); }
  .avatar-option.selected { background: var(--primary); color: white; border-color: var(--primary); }

  /* Leaderboard */
  .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .leaderboard-table th { background: #f5f5f5; padding: 10px 8px; text-align: left; font-size: .8rem; color: #666; border-bottom: 2px solid #eee; }
  .leaderboard-table td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; font-size: .85rem; }
  .leaderboard-table tr:first-child td { background: #fffde7; font-weight: 700; }
  .lb-rank { font-weight: 700; color: var(--primary); width: 40px; text-align: center; }

  /* Profile edit modal */
  .edit-form label { display: block; margin-bottom: 12px; font-size: .85rem; color: #333; font-weight: 600; }
  .edit-form input[type="text"] { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; outline: none; transition: border-color .2s; }
  .edit-form input[type="text"]:focus { border-color: var(--primary); }

  /* User badge in header */
  .user-badge { display: inline-flex; align-items: center; gap: 6px; background: #f5f5f5; padding: 4px 12px; border-radius: 20px; font-size: .8rem; cursor: pointer; transition: all .2s; }
  .user-badge:hover { background: #e0e0e0; }

  /* Profile management buttons */
  .profile-actions { display: flex; gap: 8px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
</style>
</head>
<body>
<!-- iOS Audio Wake-up Overlay -->
<div id="iosAudioOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:99999;justify-content:center;align-items:center;cursor:pointer;">
  <div style="text-align:center;color:#fff;padding:32px;border-radius:24px;background:linear-gradient(135deg,#a78bfa,#4ecdc4);max-width:300px;margin:20px;">
    <div style="font-size:3rem;margin-bottom:16px;">🔊</div>
    <div style="font-size:1.2rem;font-weight:700;margin-bottom:8px;">點擊任意處啟用音效</div>
    <div style="font-size:.9rem;opacity:.85;">讓發音和音效可以正常播放</div>
  </div>
</div>

<div class="app" id="app">
  <!-- Profile Selector Screen -->
  <div id="profileScreen">
    <div class="header">
      <h1>📚 國小必學2000英文單字</h1>
      <p>選擇你的帳號開始學習！</p>
    </div>

    <!-- Leaderboard button -->
    <div style="text-align:center;margin-bottom:16px;">
      <button class="btn-secondary" onclick="showLeaderboard()">🏆 全家排行榜</button>
    </div>

    <div id="profilesContainer"></div>
  </div>

  <!-- Main App (hidden until profile selected) -->
  <div id="mainApp" class="hidden">
    <!-- Header with user badge -->
    <div class="header">
      <h1>📚 國小必學2000英文單字</h1>
      <p>用遊戲方式快樂學習！</p>
      <button class="user-badge" onclick="switchProfile()" title="切換帳號">
        <span id="headerAvatar"></span><span id="headerName"></span>
      </button>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat"><div class="stat-val" id="totalLearned">0</div><div class="stat-label">已學會</div></div>
      <div class="stat"><div class="stat-val" id="totalStars">0</div><div class="stat-label">⭐ 星星</div></div>
      <div class="stat"><div class="stat-val" id="bestStreak">0</div><div class="stat-label">🔥 最高連勝</div></div>
      <div class="stat"><div class="stat-val" id="gamesPlayed">0</div><div class="stat-label">遊戲次數</div></div>
      <button class="btn-secondary" onclick="showWordBank()" style="margin-left:auto;">📖 單字本</button>
    </div>

    <!-- TTS Status -->
    <div id="ttsStatusBadge" class="tts-status fallback">
      <span class="tts-dot"></span>
      <span id="ttsStatusText">TTS: Web Speech API（備援）</span>
      <span id="ttsVersion" style="font-size:.65rem;color:#999;margin-left:4px;">v2.1</span>
    </div>

    <!-- Level Select -->
    <div class="level-bar" id="levelBar"></div>

    <!-- Main Menu -->
    <div id="menuScreen">
      <div class="section-title">🎮 選擇遊戲模式</div>
      <div class="game-modes" id="gameModes"></div>

      <div class="section-title">📂 選擇單字分類</div>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <!-- Game Screen -->
    <div class="game-area hidden" id="gameScreen">
      <button class="back-btn" onclick="goToMenu()">← 返回</button>
      <div class="streak hidden" id="streakDisplay"></div>
      <div id="gameContent"></div>
    </div>
  </div>
</div>

// ==================== TTS (Text-to-Speech) ====================
const APP_VERSION = 'v2.1';

function setTTSStatus(type, text) {
  const badge = document.getElementById('ttsStatusBadge');
  const label = document.getElementById('ttsStatusText');
  if (!badge || !label) return;
  badge.className = 'tts-status ' + type;
  label.textContent = text;
}

// iOS detection — show debug info on iPhone/iPad
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
if (isIOS) {
  console.log(`%c[CM TTS] iOS detected — ${APP_VERSION}`, 'color:orange;font-weight:bold');
}

let ttsMethod = null; // cached: 'google' | 'speechsynthesis' | null
let ttsAudio = null;  // Audio element for Google TTS playback

// Known natural English female voices across platforms
// Priority: Enhanced/Premium (iOS 16+) → named females → any English
const FEMALE_VOICE_NAMES = [
  'Samantha', 'Zira', 'Eva', 'Karen',
  'Moira', 'Ava', 'Tessa', 'Victoria',
  'Allison', 'Susan', 'Fiona', 'Google US English'
];

function speakWord(word, lang = 'en-US') {
  if (!word || word.trim() === '') return;

  const cleanWord = word.replace(/[^a-zA-Z\s'-]/g, '').trim();
  if (!cleanWord) return;

  // Cancel any ongoing speech (both Web Audio and Speech Synthesis)
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  if (ttsAudio) { ttsAudio.pause(); ttsAudio.currentTime = 0; }

  // iOS (Safari + Chrome): MUST call SpeechSynthesis synchronously within user gesture.
  // Google Translate TTS fails on iOS — fetch() blocked by CORS, Audio() blocked outside gesture.
  if (isIOS && 'speechSynthesis' in window) {
    speakSpeechSynthesis(cleanWord, lang);
    return;
  }

  // Non-iOS: Try Google Translate TTS first (better quality), SpeechSynthesis as fallback
  speakGoogle(cleanWord, lang).catch(() => speakSpeechSynthesis(cleanWord, lang));
}

function speakGoogle(word, lang) {
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${lang}&client=tw-ob&q=${encodeURIComponent(word)}&idx=0`;

  // Method 1: fetch + decodeAudioData (most reliable on iOS)
  return fetch(url, { mode: 'cors' })
    .then(resp => {
      if (!resp.ok) throw new Error('fetch failed');
      return resp.arrayBuffer();
    })
    .then(buffer => {
      const ctx = getAudioCtx();
      return ctx.resume().then(() => {
        return ctx.decodeAudioData(buffer).then(audioBuffer => {
          const source = ctx.createBufferSource();
          source.buffer = audioBuffer;
          source.connect(ctx.destination);
          source.start(0);
          setTTSStatus('google', '🟢 TTS: Google Translate（主要）');
        });
      });
    })
    .catch(() => {
      // Method 2: Audio element fallback (works on iOS when fetch fails)
      ttsAudio = new Audio(url);
      ttsAudio.volume = 1;
      return ttsAudio.play().then(() => {
        setTTSStatus('google', '🟢 TTS: Google Translate（主要）');
      });
    });
}

function speakSpeechSynthesis(word, lang) {
  if (!('speechSynthesis' in window)) {
    setTTSStatus('error', '🔴 TTS: 不支援');
    return;
  }

  // iOS Safari fix: ensure voices are loaded first
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) {
    // Force voice loading on iOS by doing a dummy speak
    const dummy = new SpeechSynthesisUtterance('');
    dummy.volume = 0;
    window.speechSynthesis.speak(dummy);
    window.speechSynthesis.resume();
    setTimeout(() => speakSpeechSynthesis(word, lang), 200);
    return;
  }

  // iOS Safari: must be called from user gesture context
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = lang;
  utterance.rate = 0.85;
  utterance.pitch = 1.1;

  // Select best available English female voice:
  // 1. Enhanced/Premium (iOS 16+ — most natural)
  // 2. Known female voice names (cross-platform list)
  // 3. Any English voice (last resort)
  const enVoices = voices.filter(v => v.lang.startsWith('en'));
  const voice =
    enVoices.find(v => /enhanced|premium/i.test(v.name)) ||
    enVoices.find(v => FEMALE_VOICE_NAMES.some(n => v.name.includes(n))) ||
    enVoices[0];
  if (voice) utterance.voice = voice;

  // Debug: log voice info on iOS
  if (isIOS) {
    console.log(`%c[CM TTS] Speaking "${word}" with ${voices.length} voices available`, 'color:cyan');
    const selectedVoice = utterance.voice ? utterance.voice.name : 'default';
    console.log(`%c[CM TTS] Selected voice: ${selectedVoice}`, 'color:green');
  }

  window.speechSynthesis.speak(utterance);
  setTTSStatus('fallback', '🟡 TTS: Web Speech API（備援）');
}

}

// ==================== SOUND EFFECTS (Web Audio API) ====================
let audioCtx = null;
let audioInitialized = false;

function initAudio() {
  if (audioInitialized) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const readyPromise = ctx.state === 'suspended' ? ctx.resume() : Promise.resolve();
    readyPromise.then(() => {
      audioCtx = ctx;
      audioInitialized = true;

      // iOS: play silent buffer to fully unlock AudioContext, then hide overlay
      if (isIOS) {
        const buffer = ctx.createBuffer(1, 1, 22050);
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(ctx.destination);
        source.start(0);
        const overlay = document.getElementById('iosAudioOverlay');
        if (overlay) overlay.style.display = 'none';
      }
    });
  } catch(e) {}
}

// iOS: show wake-up overlay on first load
if (isIOS) {
  window.addEventListener('load', () => {
    const overlay = document.getElementById('iosAudioOverlay');
    if (overlay) overlay.style.display = 'flex';
  });
}

// Bind initAudio to first user interaction (iOS requirement)
document.addEventListener('touchstart', initAudio, { once: true });
document.addEventListener('click', initAudio, { once: true });

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // iOS Safari: AudioContext starts suspended, must resume from user gesture
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  return audioCtx;
}

// Correct answer: pleasant ascending chime (two tones)
function playCorrectSound() {
  try {
    const ctx = getAudioCtx();
    const play = () => {
      const osc1 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
      gain1.gain.setValueAtTime(0.3, ctx.currentTime);
      gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc1.connect(gain1).connect(ctx.destination);
      osc1.start(ctx.currentTime);
      osc1.stop(ctx.currentTime + 0.3);

      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
      gain2.gain.setValueAtTime(0, ctx.currentTime);
      gain2.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.1);
      gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc2.connect(gain2).connect(ctx.destination);
      osc2.start(ctx.currentTime + 0.1);
      osc2.stop(ctx.currentTime + 0.5);

      const osc3 = ctx.createOscillator();
      const gain3 = ctx.createGain();
      osc3.type = 'sine';
      osc3.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); // G5
      gain3.gain.setValueAtTime(0, ctx.currentTime);
      gain3.gain.linearRampToValueAtTime(0.25, ctx.currentTime + 0.2);
      gain3.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.7);
      osc3.connect(gain3).connect(ctx.destination);
      osc3.start(ctx.currentTime + 0.2);
      osc3.stop(ctx.currentTime + 0.7);
    };
    if (ctx.state === 'suspended') { ctx.resume().then(play); } else { play(); }
  } catch(e) {}
}

// Wrong answer: buzzer (descending two tones)
function playWrongSound() {
  try {
    const ctx = getAudioCtx();
    const play = () => {
      const osc1 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.type = 'square';
      osc1.frequency.setValueAtTime(200, ctx.currentTime);
      gain1.gain.setValueAtTime(0.2, ctx.currentTime);
      gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
      osc1.connect(gain1).connect(ctx.destination);
      osc1.start(ctx.currentTime);
      osc1.stop(ctx.currentTime + 0.35);

      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
      gain2.gain.setValueAtTime(0, ctx.currentTime);
      gain2.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.15);
      gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
      osc2.connect(gain2).connect(ctx.destination);
      osc2.start(ctx.currentTime + 0.15);
      osc2.stop(ctx.currentTime + 0.6);
    };
    if (ctx.state === 'suspended') { ctx.resume().then(play); } else { play(); }
  } catch(e) {}
}

// ==================== START GAME ====================
function startGame() {
  // Collect words
  let words = [];
  const cats = state.selectedCategory ? [state.selectedCategory] : getLevelCategories(state.level);
  cats.forEach(c => { if (wordDB[c]) words.push(...wordDB[c]); });

  if (words.length < 4) { alert('請選擇更多分類！'); return; }

  // Shuffle and pick
  state.currentWords = shuffle(words).slice(0, Math.min(state.totalQuestions, words.length));
  state.currentIndex = 0;
  state.correctCount = 0;
  state.score = 0;
  state.streak = 0;

  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');

  switch (state.gameMode) {
    case 'quiz': startQuiz(); break;
    case 'reverse': startReverse(); break;
    case 'listen': startListen(); break;
    case 'spell': startSpell(); break;
    case 'scramble': startScramble(); break;
    case 'speed': startSpeed(); break;
  }
}

  if (state.speedTimer) clearInterval(state.speedTimer);
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('menuScreen').classList.remove('hidden');
  updateStats();
}

// ==================== QUIZ MODE ====================
function startQuiz() { showQuestion(); }

function escapeJS(str) { return str.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showQuestion() {
  if (state.currentIndex >= state.currentWords.length) { showResult(); return; }

  const [en, zh] = state.currentWords[state.currentIndex];
  const allZH = state.currentWords.map(w => w[1]);
  let choices = [zh];
  while (choices.length < 4 && allZH.length > choices.length) {
    const r = allZH[Math.floor(Math.random() * allZH.length)];
    if (!choices.includes(r)) choices.push(r);
  }

  const gc = document.getElementById('gameContent');
  gc.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${(state.currentIndex/state.currentWords.length)*100}%"></div></div>
    <button class="speaker-btn" onclick="speakWord('${escapeJS(en)}')">🔊</button>
    <div class="word-display">${en}</div>
    <div class="word-phonetic">第 ${state.currentIndex+1} / ${state.currentWords.length} 題 — 點擊喇叭聽發音</div>
    <div class="choices cols-4">${shuffle(choices).map(c =>
      `<button class="choice-btn" onclick="checkQuiz(this,'${escapeJS(c)}','${escapeJS(zh)}')">${c}</button>`
    ).join('')}</div>`;

  updateStreak();
}

function checkQuiz(btn, selected, correct) {
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.style.pointerEvents = 'none');

  if (selected === correct) {
    playCorrectSound();
    btn.classList.add('correct');
    state.correctCount++;
    state.streak++;
    markLearned(state.currentWords[state.currentIndex][0]);
    spawnConfetti(btn);
  } else {
    playWrongSound();
    btn.classList.add('wrong');
    state.streak = 0;
    const [en, zh] = state.currentWords[state.currentIndex];
    // Highlight correct answer + show hint box
    btns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
    const gc = document.getElementById('gameContent');
    const hintDiv = document.createElement('div');
    hintDiv.className = 'wrong-hint';
    hintDiv.innerHTML = `
      <div class="wrong-hint-label">💡 正確答案是：</div>
      <div class="wrong-hint-answer">${en}</div>
      <div class="wrong-hint-meaning">${zh}</div>`;
    gc.querySelector('.choices').after(hintDiv);
  }

  updateStreak();
  setTimeout(() => { state.currentIndex++; showQuestion(); }, selected === correct ? 800 : 2500);
}

// ==================== REVERSE MODE ====================
function startReverse() { showReverseQ(); }

function showReverseQ() {
  if (state.currentIndex >= state.currentWords.length) { showResult(); return; }

  const [en, zh] = state.currentWords[state.currentIndex];
  let choices = [en];
  const allEN = state.currentWords.map(w => w[0]);
  while (choices.length < 4 && allEN.length > choices.length) {
    const r = allEN[Math.floor(Math.random() * allEN.length)];
    if (!choices.includes(r)) choices.push(r);
  }

  const gc = document.getElementById('gameContent');
  gc.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${(state.currentIndex/state.currentWords.length)*100}%"></div></div>
    <div class="word-display">${zh}</div>
    <div class="word-phonetic">選擇正確的英文單字</div>
    <div class="choices cols-2">${shuffle(choices).map(c =>
      `<button class="choice-btn" onclick="checkReverse(this,'${escapeJS(c)}','${escapeJS(en)}')">${c} <span style="cursor:pointer;margin-left:6px;" onclick="event.stopPropagation();speakWord('${escapeJS(c)}')" title="聽發音">🔊</span></button>`
    ).join('')}</div>`;

  updateStreak();
}

function checkReverse(btn, selected, correct) {
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.style.pointerEvents = 'none');

  if (selected === correct) {
    playCorrectSound();
    btn.classList.add('correct');
    state.correctCount++;
    state.streak++;
    markLearned(correct);
    spawnConfetti(btn);
  } else {
    playWrongSound();
    btn.classList.add('wrong');
    state.streak = 0;
    const [en, zh] = state.currentWords[state.currentIndex];
    btns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
    const gc = document.getElementById('gameContent');
    const hintDiv = document.createElement('div');
    hintDiv.className = 'wrong-hint';
    hintDiv.innerHTML = `
      <div class="wrong-hint-label">💡 正確答案是：</div>
      <div class="wrong-hint-answer">${en}</div>
      <div class="wrong-hint-meaning">${zh}</div>`;
    gc.querySelector('.choices').after(hintDiv);
  }

  updateStreak();
  setTimeout(() => { state.currentIndex++; showReverseQ(); }, selected === correct ? 800 : 2500);
}

// ==================== LISTEN MODE ====================
function startListen() { showListenQ(); }

function showListenQ() {
  if (state.currentIndex >= state.currentWords.length) { showResult(); return; }

  const [en, zh] = state.currentWords[state.currentIndex];
  let choices = [zh];
  const allZH = state.currentWords.map(w => w[1]);
  while (choices.length < 4 && allZH.length > choices.length) {
    const r = allZH[Math.floor(Math.random() * allZH.length)];
    if (!choices.includes(r)) choices.push(r);
  }

  const gc = document.getElementById('gameContent');
  gc.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${(state.currentIndex/state.currentWords.length)*100}%"></div></div>
    <button class="listen-speaker" onclick="speakWord('${escapeJS(en)}')">🔊</button>
    <div class="word-phonetic">點擊喇叭聽發音，選出正確意思</div>
    <div style="font-size:.75rem;color:#aaa;margin-bottom:16px;">第 ${state.currentIndex+1} / ${state.currentWords.length} 題</div>
    <div class="choices cols-2">${shuffle(choices).map(c =>
      `<button class="choice-btn" onclick="checkListen(this,'${escapeJS(c)}','${escapeJS(zh)}')">${c}</button>`
    ).join('')}</div>`;

  // Auto-play the word after a short delay
  setTimeout(() => speakWord(en), 500);
  updateStreak();
}

function checkListen(btn, selected, correct) {
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.style.pointerEvents = 'none');

  if (selected === correct) {
    playCorrectSound();
    btn.classList.add('correct');
    state.correctCount++;
    state.streak++;
    markLearned(state.currentWords[state.currentIndex][0]);
    spawnConfetti(btn);
  } else {
    playWrongSound();
    btn.classList.add('wrong');
    state.streak = 0;
    const [en, zh] = state.currentWords[state.currentIndex];
    btns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
    const gc = document.getElementById('gameContent');
    const hintDiv = document.createElement('div');
    hintDiv.className = 'wrong-hint';
    hintDiv.innerHTML = `
      <div class="wrong-hint-label">💡 正確答案是：</div>
      <div class="wrong-hint-answer">${en}</div>
      <div class="wrong-hint-meaning">${zh}</div>`;
    gc.querySelector('.choices').after(hintDiv);
  }

  updateStreak();
  setTimeout(() => { state.currentIndex++; showListenQ(); }, selected === correct ? 800 : 2500);
}


// ==================== SPELL MODE ====================
function startSpell() { showSpellWord(); }

function showSpellWord() {
  if (state.currentIndex >= state.currentWords.length) { showResult(); return; }

  const [en, zh] = state.currentWords[state.currentIndex];
  state.spellWord = en.toLowerCase();
  state.spellIndex = 0;
  state.spellLetters = [];

  // Build letter pool: exact letters needed + a few extras
  let avail = [...state.spellWord.split('')];
  const alphabet = 'abcdefghijklmnopqrstuvwxyz';
  while (avail.length < Math.max(state.spellWord.length + 3, 7)) {
    avail.push(alphabet[Math.floor(Math.random() * 26)]);
  }

  const gc = document.getElementById('gameContent');
  gc.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${(state.currentIndex/state.currentWords.length)*100}%"></div></div>
    <button class="speaker-btn" onclick="speakWord('${escapeJS(en)}')">🔊</button>
    <div class="spelling-hint">${zh}</div>
    <div class="spelling-phonetic">點擊字母拼出單字 (${state.spellWord.length} 個字母)</div>
    <div class="letter-slots" id="spellSlots">
      ${Array(state.spellWord.length).fill('<div class="letter-slot"></div>').join('')}
    </div>
    <div class="letter-options" id="spellLetters">
      ${shuffle(avail).map((l,i) => `<button class="letter-btn" data-idx="${i}" onclick="pickSpellLetter(this,'${l}')">${l.toUpperCase()}</button>`).join('')}
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;">
      <button class="btn-secondary" onclick="undoSpellLetter()">↩ 上一步</button>
      <button class="btn-secondary" onclick="resetSpell()">🔄 重新開始</button>
    </div>`;

  updateStreak();
}

function pickSpellLetter(btn, letter) {
  if (state.spellIndex >= state.spellWord.length) return;

  const slots = document.querySelectorAll('#spellSlots .letter-slot');
  btn.classList.add('used');
  state.spellLetters.push({ btn: btn, letter: letter });

  slots[state.spellIndex].textContent = letter.toUpperCase();
  slots[state.spellIndex].classList.add('filled', 'current');
  state.spellIndex++;

  // Auto-check when all slots filled
  if (state.spellIndex >= state.spellWord.length) {
    const answer = state.spellLetters.map(s => s.letter).join('');
    setTimeout(() => checkSpellAnswer(answer), 300);
  }
}

function undoSpellLetter() {
  if (state.spellIndex <= 0) return;
  state.spellIndex--;
  const removed = state.spellLetters.pop();
  removed.btn.classList.remove('used');

  const slots = document.querySelectorAll('#spellSlots .letter-slot');
  slots[state.spellIndex].textContent = '';
  slots[state.spellIndex].classList.remove('filled', 'current');
}

function checkSpellAnswer(answer) {
  const slots = document.querySelectorAll('#spellSlots .letter-slot');

  if (answer === state.spellWord) {
    playCorrectSound();
    slots.forEach(s => { s.style.borderColor = 'var(--green)'; s.style.background = '#ecfdf5'; });
    state.correctCount++;
    state.streak++;
    markLearned(state.spellWord);
    spawnConfetti(slots[0]);
  } else {
    playWrongSound();
    slots.forEach(s => { s.style.borderColor = 'var(--red)'; s.style.color = 'var(--red)'; });
    const [en, zh] = state.currentWords[state.currentIndex];
    // Show correct answer briefly
    state.spellLetters.forEach(item => item.btn.classList.remove('used'));
    state.spellLetters = [];
    state.spellIndex = 0;
    slots.forEach(s => { s.textContent=''; s.classList.remove('filled','current'); });

    const gc = document.getElementById('gameContent');
    const hintDiv = document.createElement('div');
    hintDiv.className = 'wrong-hint';
    hintDiv.innerHTML = `
      <div class="wrong-hint-label">💡 正確拼法是：</div>
      <div class="wrong-hint-answer">${en}</div>
      <div class="wrong-hint-meaning">${zh}</div>`;
    gc.querySelector('.letter-slots').after(hintDiv);

    setTimeout(() => {
      slots.forEach(s => { s.style.borderColor = ''; s.style.color = ''; });
    }, 1500);
  }

  updateStreak();
  setTimeout(() => { state.currentIndex++; showSpellWord(); }, answer === state.spellWord ? 800 : 2500);
}

function resetSpell() {
  state.spellLetters.forEach(item => item.btn.classList.remove('used'));
  state.spellIndex = 0;
  state.spellLetters = [];
  document.querySelectorAll('#spellSlots .letter-slot').forEach(s => { s.textContent=''; s.classList.remove('filled','current'); s.style.borderColor=''; s.style.color=''; });
}

// ==================== SCRAMBLE MODE ====================
function startScramble() { showScrambleWord(); }

function showScrambleWord() {
  if (state.currentIndex >= state.currentWords.length) { showResult(); return; }

  const [en, zh] = state.currentWords[state.currentIndex];
  const scrambled = shuffle(en.split('')).join('');

  const gc = document.getElementById('gameContent');
  gc.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${(state.currentIndex/state.currentWords.length)*100}%"></div></div>
    <button class="speaker-btn" onclick="speakWord('${escapeJS(en)}')">🔊</button>
    <div class="spelling-hint">${zh}</div>
    <div class="word-phonetic">把打亂的字母重新排列 — 點擊喇叭聽發音</div>
    <div class="letter-slots" id="scrambleSlots">
      ${Array(en.length).fill('<div class="letter-slot"></div>').join('')}
    </div>
    <div class="scrambled-letters" id="scrambleLetters">
      ${shuffle([...scrambled]).map((l,i) => `<button class="scramble-btn" data-letter="${l}" onclick="pickScramble(this,'${l}')">${l.toUpperCase()}</button>`).join('')}
    </div>
    <button class="btn-secondary" onclick="resetScramble()" style="margin-top:12px;">重新開始</button>`;

  updateStreak();
}

function pickScramble(btn, letter) {
  const [en] = state.currentWords[state.currentIndex];
  const slots = document.querySelectorAll('#scrambleSlots .letter-slot');
  const filledCount = [...slots].filter(s => s.textContent).length;

  if (filledCount >= en.length) return;

  btn.classList.add('used');
  slots[filledCount].textContent = letter.toUpperCase();
  slots[filledCount].classList.add('filled');

  // Check answer when all filled
  const [enFull, zhFull] = state.currentWords[state.currentIndex];
  const answer = [...slots].map(s => s.textContent.toLowerCase()).join('');
  if (answer.length === en.length) {
    document.querySelectorAll('#scrambleLetters .scramble-btn').forEach(b => b.style.pointerEvents = 'none');

    if (answer === enFull.toLowerCase()) {
      playCorrectSound();
      slots.forEach(s => { s.style.borderColor = 'var(--green)'; s.style.background = '#ecfdf5'; });
      state.correctCount++;
      state.streak++;
      markLearned(enFull);
      spawnConfetti(slots[0]);
    } else {
      playWrongSound();
      slots.forEach(s => { s.style.borderColor = 'var(--red)'; s.style.color = 'var(--red)'; });
      state.streak = 0;

      const gc = document.getElementById('gameContent');
      const hintDiv = document.createElement('div');
      hintDiv.className = 'wrong-hint';
      hintDiv.innerHTML = `
        <div class="wrong-hint-label">💡 正確答案是：</div>
        <div class="wrong-hint-answer">${enFull}</div>
        <div class="wrong-hint-meaning">${zhFull}</div>`;
      gc.querySelector('.scrambled-letters').after(hintDiv);
    }

    updateStreak();
    setTimeout(() => { state.currentIndex++; showScrambleWord(); }, answer === enFull.toLowerCase() ? 800 : 2500);
  }
}

function resetScramble() {
  document.querySelectorAll('#scrambleSlots .letter-slot').forEach(s => { s.textContent=''; s.classList.remove('filled'); s.style.borderColor=''; s.style.background=''; s.style.color=''; });
  document.querySelectorAll('#scrambleLetters .scramble-btn').forEach(b => { b.classList.remove('used'); b.style.pointerEvents = ''; });
}

// ==================== SPEED QUIZ MODE ====================
function startSpeed() {
  state.speedTimeLeft = 30;
  state.currentIndex = 0;
  state.correctCount = 0;
  showSpeedQ();

  state.speedTimer = setInterval(() => {
    state.speedTimeLeft--;
    const fill = document.querySelector('.timer-fill');
    if (fill) {
      fill.style.width = (state.speedTimeLeft / 30 * 100) + '%';
      fill.style.background = state.speedTimeLeft < 10 ? 'var(--red)' : state.speedTimeLeft < 20 ? 'var(--orange)' : 'var(--green)';
    }
    if (state.speedTimeLeft <= 0) {
      clearInterval(state.speedTimer);
      showResult();
    }
  }, 100);
}

function showSpeedQ() {
  // Pick random word from current set or regenerate
  let pool = state.currentWords;
  if (pool.length < 4) pool = [];
  const [en, zh] = pool[Math.floor(Math.random() * pool.length)];

  let choices = [zh];
  // Gather more Chinese meanings for distractors
  const allZH = state.currentWords.map(w => w[1]);
  while (choices.length < 4 && allZH.length > choices.length) {
    const r = allZH[Math.floor(Math.random() * allZH.length)];
    if (!choices.includes(r)) choices.push(r);
  }

  const gc = document.getElementById('gameContent');
  gc.innerHTML = `
    <div class="timer-bar"><div class="timer-fill" style="width:${(state.speedTimeLeft/30)*100}%;background:${state.speedTimeLeft<10?'var(--red)':state.speedTimeLeft<20?'var(--orange)':'var(--green)'}"></div></div>
    <div style="font-size:.8rem;color:#999;margin-bottom:4px;">得分: ${state.correctCount} | 剩餘時間: ${state.speedTimeLeft}s</div>
    <button class="speaker-btn" onclick="speakWord('${escapeJS(en)}')">🔊</button>
    <div class="word-display">${en}</div>
    <div class="choices cols-2" id="speedChoices">
      ${shuffle(choices).map(c => `<button class="choice-btn" onclick="checkSpeed(this,'${escapeJS(c)}','${escapeJS(zh)}')">${c}</button>`).join('')}
    </div>`;

  updateStreak();
}

function checkSpeed(btn, selected, correct) {
  const btns = document.querySelectorAll('#speedChoices .choice-btn');
  btns.forEach(b => b.style.pointerEvents = 'none');

  if (selected === correct) {
    playCorrectSound();
    btn.classList.add('correct');
    state.correctCount++;
    state.streak++;
    markLearned(state.currentWords.find(w=>w[1]===correct)?.[0]);
  } else {
    playWrongSound();
    btn.classList.add('wrong');
    state.streak = 0;
    const word = state.currentWords.find(w => w[1] === correct);
    if (word) {
      const [en, zh] = word;
      btns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
      const gc = document.getElementById('gameContent');
      const hintDiv = document.createElement('div');
      hintDiv.className = 'wrong-hint';
      hintDiv.innerHTML = `
        <div class="wrong-hint-label">💡 正確答案是：</div>
        <div class="wrong-hint-answer">${en}</div>
        <div class="wrong-hint-meaning">${zh}</div>`;
      gc.querySelector('.choices').after(hintDiv);
    }
  }

  updateStreak();
  setTimeout(showSpeedQ, selected === correct ? 400 : 1500);
}

// ==================== RESULT SCREEN ====================
function showResult() {
  if (state.speedTimer) clearInterval(state.speedTimer);

  const total = state.currentWords.length;
  const pct = total > 0 ? Math.round(state.correctCount / total * 100) : 0;
  let stars = pct >= 90 ? 3 : pct >= 60 ? 2 : pct >= 30 ? 1 : 0;

  state.totalStars += stars;
  state.gamesPlayed++;
  if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  saveState();

  const gc = document.getElementById('gameContent');
  gc.innerHTML = `
    <div class="result-screen">
      <div class="result-stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
      <div class="result-score">${state.correctCount}/${total}</div>
      <div class="result-label">${pct >= 90 ? '太棒了！完美表現！🎉' : pct >= 60 ? '做得好！繼續加油！💪' : '再試一次，你可以的！🌟'}</div>
      <div style="font-size:.8rem;color:#999;">準確率 ${pct}% | 連勝 ${state.streak} 題</div>
      <button class="btn-primary" onclick="startGame()">🔄 再玩一次</button>
      <button class="btn-secondary" onclick="goToMenu()" style="margin-left:8px;">返回主選單</button>
    </div>`;

  if (stars >= 2) spawnConfetti(gc);
}

// ==================== HELPERS ====================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function markLearned(word) {
  state.learnedWords[word] = (state.learnedWords[word] || 0) + 1;
  saveState();
}

function updateStreak() {
  const el = document.getElementById('streakDisplay');
  if (state.streak >= 2) {
    el.classList.remove('hidden');
    el.textContent = `🔥 ${state.streak} 連勝`;
  } else {
    el.classList.add('hidden');
  }
}

function updateStats() {
  const learned = Object.keys(state.learnedWords).length;
  document.getElementById('totalLearned').textContent = learned;
  document.getElementById('totalStars').textContent = state.totalStars;
  document.getElementById('bestStreak').textContent = state.bestStreak;
  document.getElementById('gamesPlayed').textContent = state.gamesPlayed;
}

function saveState() {
  localStorage.setItem(getUserKey('stars'), String(state.totalStars));
  localStorage.setItem(getUserKey('games'), String(state.gamesPlayed));
  localStorage.setItem(getUserKey('streak'), String(state.bestStreak));
  localStorage.setItem(getUserKey('learned'), JSON.stringify(state.learnedWords));
}

function spawnConfetti(el) {
  const rect = el.getBoundingClientRect();
  const gameArea = document.getElementById('gameScreen');
  for (let i = 0; i < 12; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = (rect.left + Math.random() * rect.width) + 'px';
    piece.style.top = rect.top + 'px';
    piece.style.background = ['#ff6b9d','#4ecdc4','#ffe66d','#a78bfa','#ff8a5c'][Math.floor(Math.random()*5)];
    piece.style.animationDelay = (Math.random() * .3) + 's';
    gameArea.appendChild(piece);
    setTimeout(() => piece.remove(), 2000);
  }
}

function showWordBank() {
  const learned = Object.keys(state.learnedWords);
  let allWords = [];
  categories.forEach(c => wordDB[c].forEach(w => allWords.push(w)));

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      <h3>📖 單字本 — ${learned.length} / ${allWords.length} 已學會</h3>
      <div style="margin-bottom:12px;">
        <div style="height:8px;background:#eee;border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${(learned/allWords.length)*100}%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:4px;"></div>
        </div>
      </div>
      ${categories.map(c => `
        <h4 style="font-size:.8rem;color:#666;margin:12px 0 6px;">${getCatIcon(c)} ${c}</h4>
        ${wordDB[c].map(([en,zh]) => `
          <div class="word-list-item">
            <span>${en} <span style="cursor:pointer;" onclick="speakWord('${escapeJS(en)}')" title="聽發音">🔊</span></span>
            <span>${zh} ${learned.includes(en)?'<span class="word-learned">✓</span>':'<span class="word-unlearned">○</span>'}</span>
          </div>`).join('')}
      `).join('')}
    </div>`;

  document.body.appendChild(overlay);
}

// TTS Detection — test which service works on load
function detectTTS() {
  if (isIOS) {
    // iOS: SpeechSynthesis is the primary method
    setTTSStatus('fallback', `🟡 TTS: Web Speech API（iOS 主要）${APP_VERSION}`);
  } else if ('speechSynthesis' in window && window.speechSynthesis.getVoices().length > 0) {
    setTTSStatus('fallback', '🟡 TTS: Web Speech API（備援）');
  } else {
    // Assume Google Translate TTS is available — it will auto-detect failures during actual use
    setTTSStatus('google', `🟢 TTS: Google Translate（主要）${APP_VERSION}`);
  }
}

// Init — show profile selector first
renderProfiles();
detectTTS();
</script>
